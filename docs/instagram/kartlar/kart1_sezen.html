<!doctype html><html><head><meta charset="utf-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; font-family:-apple-system,'SF Pro Display',Helvetica,Arial,sans-serif;
  background: radial-gradient(120% 90% at 50% 0%, #1c2450 0%, #0e1230 55%, #090b20 100%);
  color:#fff; display:flex; flex-direction:column; padding:72px 84px; position:relative; overflow:hidden; }
.glow { position:absolute; width:700px; height:700px; border-radius:50%;
  background: radial-gradient(circle, rgba(255,170,40,.16) 0%, transparent 65%);
  top:-260px; right:-220px; }
.brand { display:flex; align-items:center; gap:20px; }
.brand .logo { width:76px; height:76px; border-radius:20px;
  background:linear-gradient(135deg,#ffd54f,#ff8f00); display:flex; align-items:center;
  justify-content:center; font-size:40px; font-weight:900; color:#1a1a2e; }
.brand .name { font-size:40px; font-weight:900; letter-spacing:1px; }
.brand .name span { color:#ffc107; }
.chip { margin-top:84px; align-self:flex-start; background:rgba(255,193,7,.14);
  border:2px solid rgba(255,193,7,.55); color:#ffc107; font-weight:800;
  font-size:30px; letter-spacing:4px; padding:14px 34px; border-radius:999px; }
.q { margin-top:44px; font-size:66px; line-height:1.22; font-weight:900; }
.opts { margin-top:64px; display:flex; flex-direction:column; gap:26px; }
.opt { display:flex; align-items:center; gap:26px; background:rgba(255,255,255,.055);
  border:2px solid rgba(255,255,255,.14); border-radius:24px; padding:28px 34px; }
.opt .h { width:56px; height:56px; border-radius:16px; background:rgba(255,193,7,.16);
  color:#ffc107; font-weight:900; font-size:30px; display:flex; align-items:center; justify-content:center; }
.opt .t { font-size:38px; font-weight:700; }
.cta { margin-top:auto; display:flex; align-items:center; justify-content:space-between; }
.cta .yaz { font-size:36px; font-weight:800; color:#ffc107; }
.cta .alt { font-size:28px; color:rgba(255,255,255,.55); font-weight:600; }
.fall { position:absolute; bottom:64px; right:84px; font-size:30px; color:rgba(255,255,255,.35); font-weight:700; }
</style></head><body>
<div class="glow"></div>
<div class="brand"><div class="logo">B</div><div class="name">BİL YA DA <span>DÜŞ</span></div></div>
<div class="chip">MÜZİK</div>
<div class="q">Sezen Aksu&#x27;nun lakabı nedir?</div>
<div class="opts"><div class="opt"><div class="h">A</div><div class="t">Sanat Güneşi</div></div><div class="opt"><div class="h">B</div><div class="t">Diva</div></div><div class="opt"><div class="h">C</div><div class="t">Minik Serçe</div></div><div class="opt"><div class="h">D</div><div class="t">Süperstar</div></div></div>
<div class="cta"><div><div class="yaz">Cevabını yorumlara yaz 👇</div>
<div class="alt">Yanlış bilenler kapaktan düşer 🔥 · App Store'da ücretsiz</div></div></div>
</body></html>
