<script>
        const container = document.getElementById('confetti-container');
        const colors = ['#ffb0cb', '#d2bbff', '#1ddfbe', '#FFD23F'];
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = -10 + 'px';
                confetti.style.borderRadius = '2px';
                confetti.style.opacity = Math.random();
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(confetti);
                const duration = Math.random() * 3 + 2;
                const destinationY = window.innerHeight + 20;
                const destinationX = (Math.random() - 0.5) * 200;
                confetti.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${destinationX}px, ${destinationY}px) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
                ], { duration: duration * 1000, easing: 'cubic-bezier(0, .9, .57, 1)', fill: 'forwards' });
                setTimeout(() => { confetti.remove(); }, duration * 1000);
            }
        }
        window.addEventListener('DOMContentLoaded', () => { createConfetti(); setInterval(createConfetti, 4000); });
    </script>
