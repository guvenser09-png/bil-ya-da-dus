<script>
        function createConfetti() {
            const container = document.getElementById('confetti-wrapper');
            const colors = ['#ffb0cb', '#d2bbff', '#1ddfbe', '#FFD23F'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                const size = Math.random() * 10 + 5;
                const color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.borderRadius = i % 2 === 0 ? '50%' : '2px';
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 15 + 5;
                const tx = Math.cos(angle) * velocity * 20;
                const ty = Math.sin(angle) * velocity * 20;
                container.appendChild(confetti);
                const animation = confetti.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], { duration: 1000 + Math.random() * 2000, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)', fill: 'forwards' });
                animation.onfinish = () => confetti.remove();
            }
        }
        window.addEventListener('DOMContentLoaded', () => { setTimeout(createConfetti, 300); setInterval(createConfetti, 4000); });
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => { btn.style.transform = 'scale(0.95)'; });
            btn.addEventListener('touchend', () => { btn.style.transform = 'scale(1)'; });
        });
    </script>
