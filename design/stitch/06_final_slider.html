<script>
        const slider = document.getElementById('answer-slider');
        const badge = document.getElementById('slider-badge');
        function updateSlider() {
            const val = slider.value;
            badge.innerText = val;
            const min = slider.min ? slider.min : 0;
            const max = slider.max ? slider.max : 100;
            const newVal = Number(((val - min) * 100) / (max - min));
            badge.style.left = `calc(${newVal}% + (${8 - newVal * 0.15}px))`;
        }
        slider.addEventListener('input', updateSlider);
        updateSlider();
        let timeLeft = 8;
        const timerText = document.getElementById('timer-text');
        const timerCircle = document.getElementById('timer-circle');
        const fullOffset = 251.2;
        const timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) { clearInterval(timerInterval); timeLeft = 0; timerText.classList.add('animate-ping'); }
            timerText.innerText = timeLeft.toString().padStart(2, '0');
            const offset = fullOffset - (timeLeft / 8) * fullOffset;
            timerCircle.style.strokeDashoffset = offset;
            if (timeLeft <= 3) {
                timerCircle.classList.remove('text-primary');
                timerCircle.classList.add('text-error');
                timerText.classList.add('text-error');
            }
        }, 1000);
        slider.addEventListener('mousedown', () => badge.classList.add('scale-110'));
        slider.addEventListener('mouseup', () => badge.classList.remove('scale-110'));
    </script>
