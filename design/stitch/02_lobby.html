<div class="absolute bottom-1/3 left-1/4 w-1.5 h-1.5 rounded-full bg-secondary animate-pulse" style="animation-delay: 2s"></div>
<div class="absolute top-2/3 right-1/4 w-2 h-2 rounded-full bg-primary animate-ping" style="animation-delay: 0.5s"></div>
</div>
<script>
        let timeLeft = 20;
        const timerText = document.querySelector('.timer-pulse span:first-child');
        const progressRing = document.querySelector('circle.text-tertiary');
        const totalDash = 552;
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                timerText.textContent = timeLeft;
                const offset = totalDash - (timeLeft / 20) * totalDash;
                progressRing.style.strokeDashoffset = offset;
                if (timeLeft <= 5) {
                    progressRing.classList.remove('text-tertiary');
                    progressRing.classList.add('text-primary');
                    timerText.classList.remove('text-tertiary');
                    timerText.classList.add('text-primary');
                }
            } else { clearInterval(countdown); }
        }, 1000);
    </script>
