<script>
        let timeLeft = 8;
        const totalTime = 8;
        const timerCircle = document.getElementById('timer-circle');
        const timerText = document.getElementById('timer-text');
        const dashArray = 213.6;
        function updateTimer() {
            if (timeLeft <= 0) { clearInterval(interval); return; }
            timeLeft -= 0.1;
            const offset = dashArray - (timeLeft / totalTime) * dashArray;
            timerCircle.style.strokeDashoffset = offset;
            timerText.innerText = Math.ceil(timeLeft);
            if (timeLeft < 3) {
                timerCircle.style.stroke = "#ff479c";
                timerText.classList.remove('text-tertiary');
                timerText.classList.add('text-primary');
            }
        }
        const interval = setInterval(updateTimer, 100);
    </script>
