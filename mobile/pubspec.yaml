name: quizroyale
description: Fall Guys tarzı mobil trivia battle royale oyunu
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  web_socket_channel: ^3.0.1
  http: ^1.2.1
  dio: ^5.4.3+1
  lottie: ^3.1.2
  in_app_purchase: ^3.2.0
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  confetti: ^0.7.0
  audioplayers: ^6.0.0
  haptic_feedback: ^0.5.1+1
  qr_flutter: ^4.1.0
  in_app_review: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
    - assets/legal/
