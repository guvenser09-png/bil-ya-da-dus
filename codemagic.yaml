# Codemagic CI — "Bil ya da Düş" iOS App Store derlemesi
# ---------------------------------------------------------------------------
# Flutter uygulaması bu monorepo'da `mobile/` altında.
# Kod imzalama, App Store Connect API anahtarı (Codemagic entegrasyonu) ile
# OTOMATİK yapılır: sertifika + provisioning profili YOKSA OLUŞTURULUR
# (app-store-connect fetch-signing-files --create). Yerelde Xcode GEREKMEZ.
#
# Üretilen IPA, prod backend adresine (Railway) bağlanır ve TestFlight'a yüklenir.
# ---------------------------------------------------------------------------

workflows:
  ios-appstore:
    name: iOS App Store (Bil ya da Düş)
    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      # ⚠️ Codemagic'teki App Store Connect entegrasyonunun ADIYLA BİREBİR AYNI.
      app_store_connect: BilYaDaDus_ASC

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - appstore            # CERT_KEY_PASSPHRASE burada (Codemagic env var)
      vars:
        BUNDLE_ID: "com.bilyadadus.app"

    scripts:
      - name: Flutter paketleri
        script: cd mobile && flutter pub get

      - name: CocoaPods kurulumu
        script: cd mobile/ios && pod install

      - name: İmza sertifikası + profili al/oluştur
        script: |
          set -e   # imza adımı sessizce geçmesin; hata olursa BURADA dursun
          # Eski/bozuk CERTIFICATE_PRIVATE_KEY env değişkenini devre dışı bırak:
          # app-store-connect onu otomatik --certificate-key sanıp hata veriyordu.
          unset CERTIFICATE_PRIVATE_KEY
          keychain initialize
          # Özel imza anahtarı repoda ŞİFRELİ tutulur (mobile/ci/cert_key.enc).
          # Codemagic'e sadece KISA bir parola (CERT_KEY_PASSPHRASE) girilir;
          # build'de bu parolayla anahtar geri açılır. (2272 karakter yapıştırma
          # derdi yok; parola kısa olduğu için bozulmaz.)
          echo ">> CERT_KEY_PASSPHRASE uzunluk: ${#CERT_KEY_PASSPHRASE} (27 beklenir)"
          openssl enc -d -aes-256-cbc -pbkdf2 -a \
            -in mobile/ci/cert_key.enc -out /tmp/cert_key.pem \
            -pass env:CERT_KEY_PASSPHRASE
          echo ">> Çözülen anahtar boyutu: $(wc -c < /tmp/cert_key.pem) bayt (PEM ~1704 beklenir)"

          # --- Eski dağıtım sertifikalarını sil (yer aç) ---
          # Apple limiti dolu (3 adet); bunların özel anahtarı bulutta YOK, yani
          # kullanılamıyorlar. API anahtarı Admin olduğu için build içinden
          # silip yer açıyoruz. Best-effort: hata olsa bile build durmaz.
          set +e
          app-store-connect certificates list --json > /tmp/certs.json 2>/tmp/certs.err
          echo ">> Sertifika listeleme hatası (varsa): $(cat /tmp/certs.err)"
          for CID in $(jq -r '.[] | select(.attributes.certificateType | test("DISTRIBUTION")) | .id' /tmp/certs.json 2>/dev/null); do
            echo ">> Eski dağıtım sertifikası siliniyor: $CID"
            app-store-connect certificates delete "$CID" </dev/null
          done
          set -e

          # Şimdi bizim KALICI anahtarımızla TEK yeni sertifika + profil oluştur.
          # Sonraki build'ler aynı sertifikayı bulup tekrar kullanır → 409 bitmiş olur.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create \
            --verbose
          keychain add-certificates
          # Profilleri Xcode projesine uygula + ~/export_options.plist üret.
          cd mobile && xcode-project use-profiles

      - name: IPA derle (prod backend gömülü)
        script: |
          cd mobile
          # Build numarası her Codemagic build'inde otomatik artar ($BUILD_NUMBER
          # = bu projede sıralı, benzersiz sayı). Böylece "sürüm artmadı" (Apple)
          # reddi bir daha olmaz; elle pubspec güncellemeye gerek kalmaz.
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=API_BASE_URL=https://bil-ya-da-dus-production.up.railway.app \
            --dart-define=WS_BASE_URL=wss://bil-ya-da-dus-production.up.railway.app \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # İlk yüklemede TestFlight'a otomatik gönderir.
        # (App Store Connect'te uygulama kaydı com.bilyadadus.app önceden var.)
        submit_to_testflight: true
