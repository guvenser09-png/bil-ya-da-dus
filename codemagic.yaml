# Codemagic CI — "Bil ya da Düş" iOS App Store derlemesi
# ---------------------------------------------------------------------------
# Flutter uygulaması bu monorepo'da `mobile/` altında.
# Kod imzalama, App Store Connect API anahtarı (Codemagic entegrasyonu) ile
# OTOMATİK yapılır — yerelde Xcode GEREKMEZ.
#
# Üretilen IPA, prod backend adresine (Railway) bağlanır ve TestFlight'a yüklenir.
# ---------------------------------------------------------------------------

workflows:
  ios-appstore:
    name: iOS App Store (Bil ya da Düş)
    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      # ⚠️ ÖNEMLİ: Bu ad, Codemagic'te oluşturacağın App Store Connect
      #    entegrasyonunun ADIYLA BİREBİR AYNI olmalı.
      #    (Codemagic → Teams → Integrations → App Store Connect → Connect)
      app_store_connect: BilYaDaDus_ASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bilyadadus.app
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter paketleri
        script: cd mobile && flutter pub get

      - name: CocoaPods kurulumu
        script: cd mobile/ios && pod install

      - name: İmzalama profillerini uygula
        script: cd mobile && xcode-project use-profiles

      - name: IPA derle (prod backend gömülü)
        script: |
          cd mobile
          flutter build ipa --release \
            --dart-define=API_BASE_URL=https://bil-ya-da-dus-production.up.railway.app \
            --dart-define=WS_BASE_URL=wss://bil-ya-da-dus-production.up.railway.app \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # İlk yüklemede TestFlight'a otomatik gönderir.
        # NOT: App Store Connect'te uygulama kaydının (com.bilyadadus.app)
        # ÖNCEDEN oluşturulmuş olması gerekir.
        submit_to_testflight: true
